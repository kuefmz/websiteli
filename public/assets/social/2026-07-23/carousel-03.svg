<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350"><rect width="1080" height="1350" fill="#0f172a"/><text x="80" y="150" fill="#f8fafc" font-family="Arial" font-size="58" font-weight="800">2. Ask what matters</text><text x="80" y="235" fill="#cbd5e1" font-family="Arial" font-size="32">Only ask questions that change the next step.</text><g font-family="Arial" font-size="32" font-weight="700"><rect x="80" y="350" width="430" height="120" rx="28" fill="#fff"/><text x="125" y="423" fill="#0f172a">Service type</text><rect x="570" y="350" width="430" height="120" rx="28" fill="#fff"/><text x="615" y="423" fill="#0f172a">Urgency</text><rect x="80" y="520" width="430" height="120" rx="28" fill="#fff"/><text x="125" y="593" fill="#0f172a">Location</text><rect x="570" y="520" width="430" height="120" rx="28" fill="#fff"/><text x="615" y="593" fill="#0f172a">Budget range</text><rect x="80" y="690" width="920" height="150" rx="28" fill="#1e293b" stroke="#64748b" stroke-width="3"/><text x="125" y="770" fill="#f8fafc">Useful context</text></g><text x="80" y="1010" fill="#f59e0b" font-family="Arial" font-size="42" font-weight="800">Short does not mean empty.</text><text x="80" y="1080" fill="#cbd5e1" font-family="Arial" font-size="31">Three to five useful questions are often enough.</text><text x="80" y="1280" fill="#f8fafc" font-family="Arial" font-size="28" font-weight="700">Websiteli</text></svg>