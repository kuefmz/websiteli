<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350"><rect width="1080" height="1350" fill="#0f172a"/><text x="80" y="150" fill="#f8fafc" font-family="Arial" font-size="58" font-weight="800">4. Use AI carefully</text><text x="80" y="235" fill="#cbd5e1" font-family="Arial" font-size="32">Let AI prepare the lead. Let people decide.</text><rect x="80" y="360" width="920" height="520" rx="42" fill="#fff"/><g font-family="Arial"><text x="135" y="455" fill="#0f172a" font-size="34" font-weight="700">AI can:</text><text x="150" y="535" fill="#475569" font-size="31">✓ Summarise the enquiry</text><text x="150" y="605" fill="#475569" font-size="31">✓ Detect service type and urgency</text><text x="150" y="675" fill="#475569" font-size="31">✓ Flag missing information</text><text x="150" y="745" fill="#475569" font-size="31">✓ Draft a reply for review</text></g><rect x="120" y="925" width="840" height="150" rx="32" fill="#1e293b"/><text x="170" y="990" fill="#f59e0b" font-family="Arial" font-size="34" font-weight="800">Human control stays essential</text><text x="170" y="1040" fill="#cbd5e1" font-family="Arial" font-size="28">for pricing, eligibility and relationships.</text><text x="80" y="1280" fill="#f8fafc" font-family="Arial" font-size="28" font-weight="700">Websiteli</text></svg>