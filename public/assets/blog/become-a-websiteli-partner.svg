<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">Websiteli partner program visual</title>
  <desc id="desc">A premium editorial illustration showing partner businesses connected to Websiteli technical delivery for websites, AI, automation and event experiences.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#151820"/>
      <stop offset="0.48" stop-color="#10151c"/>
      <stop offset="1" stop-color="#10201d"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ff5c70"/>
      <stop offset="1" stop-color="#5ab9a8"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#222733"/>
      <stop offset="1" stop-color="#151b24"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1536" height="1024" fill="url(#bg)"/>
  <rect width="1536" height="1024" fill="url(#grid)"/>
  <circle cx="236" cy="172" r="260" fill="#ff5c70" opacity="0.14"/>
  <circle cx="1316" cy="844" r="300" fill="#5ab9a8" opacity="0.14"/>

  <g transform="translate(120 112)">
    <rect width="1296" height="800" rx="34" fill="#ffffff" opacity="0.045" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="48" y="82" fill="#ff5c70" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="4">WEBSITELI PARTNERS</text>
    <text x="48" y="154" fill="#f8f3ec" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="900">Grow your client offer</text>
    <text x="48" y="226" fill="#f8f3ec" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="900">without hiring developers.</text>
    <text x="52" y="292" fill="#c8ced8" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500">Referral, white-label and long-term technical partnership</text>

    <g transform="translate(54 376)" filter="url(#shadow)">
      <rect width="360" height="190" rx="22" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.16"/>
      <circle cx="62" cy="58" r="25" fill="#ff5c70" opacity="0.22"/>
      <path d="M52 58 h20 M62 48 v20" stroke="#ff7a83" stroke-width="5" stroke-linecap="round"/>
      <text x="38" y="114" fill="#f8f3ec" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850">Agencies</text>
      <text x="38" y="152" fill="#c8ced8" font-family="Inter, Arial, sans-serif" font-size="21">Websites, SEO, AI, automation</text>
    </g>

    <g transform="translate(468 376)" filter="url(#shadow)">
      <rect width="360" height="190" rx="22" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.16"/>
      <circle cx="62" cy="58" r="25" fill="#5ab9a8" opacity="0.24"/>
      <path d="M49 68 l13 -28 13 28 M54 60 h16" stroke="#7ed8c8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="38" y="114" fill="#f8f3ec" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850">Event pros</text>
      <text x="38" y="152" fill="#c8ced8" font-family="Inter, Arial, sans-serif" font-size="21">Event pages, forms, guest flows</text>
    </g>

    <g transform="translate(882 376)" filter="url(#shadow)">
      <rect width="360" height="190" rx="22" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.16"/>
      <circle cx="62" cy="58" r="25" fill="#ff5c70" opacity="0.18"/>
      <path d="M48 60 c10 -18 28 -18 38 0 M48 60 c10 18 28 18 38 0" stroke="#ff7a83" stroke-width="5" fill="none" stroke-linecap="round"/>
      <text x="38" y="114" fill="#f8f3ec" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850">Consultants</text>
      <text x="38" y="152" fill="#c8ced8" font-family="Inter, Arial, sans-serif" font-size="21">Technical delivery and support</text>
    </g>

    <g transform="translate(186 612)">
      <path d="M0 56 H318" stroke="url(#brand)" stroke-width="8" stroke-linecap="round"/>
      <path d="M414 56 H732" stroke="url(#brand)" stroke-width="8" stroke-linecap="round"/>
      <circle cx="366" cy="56" r="58" fill="url(#brand)" opacity="0.22"/>
      <circle cx="366" cy="56" r="38" fill="#141923" stroke="#ffffff" stroke-opacity="0.2" stroke-width="2"/>
      <text x="336" y="66" fill="#f8f3ec" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="950">W+</text>
      <text x="236" y="148" fill="#f8f3ec" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="850">Swiss-based technical delivery</text>
      <text x="158" y="196" fill="#c8ced8" font-family="Inter, Arial, sans-serif" font-size="23">Websites, AI chatbots, automations, dashboards and digital experiences</text>
    </g>
  </g>
</svg>
