<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Website lead qualification</title>
  <desc id="desc">A Swiss small business website turns incoming enquiries into qualified leads using smart forms, routing and automation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1420" cy="120" r="260" fill="#334155" opacity="0.35"/>
  <circle cx="170" cy="790" r="280" fill="#172554" opacity="0.42"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="110" y="150" fill="#f8fafc" font-size="76" font-weight="800">Turn enquiries into</text>
    <text x="110" y="235" fill="url(#accent)" font-size="76" font-weight="800">qualified leads</text>
    <text x="114" y="300" fill="#cbd5e1" font-size="30">Smart forms · clear routing · faster follow-up</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="110" y="380" width="560" height="365" rx="34" fill="#ffffff"/>
    <rect x="150" y="425" width="480" height="60" rx="16" fill="#f1f5f9"/>
    <circle cx="182" cy="455" r="12" fill="#f59e0b"/>
    <rect x="210" y="442" width="220" height="16" rx="8" fill="#94a3b8"/>
    <rect x="150" y="515" width="230" height="62" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
    <rect x="400" y="515" width="230" height="62" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
    <rect x="150" y="600" width="480" height="72" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
    <rect x="150" y="695" width="220" height="50" rx="25" fill="url(#accent)"/>
    <text x="196" y="729" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Send enquiry</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="855" y="375" width="590" height="390" rx="40" fill="#0b1220" stroke="#475569" stroke-width="3"/>
    <text x="910" y="440" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Lead routing</text>
    <g font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">
      <rect x="910" y="495" width="160" height="72" rx="22" fill="#1d4ed8"/><text x="950" y="540" fill="#fff">Urgent</text>
      <rect x="1125" y="495" width="160" height="72" rx="22" fill="#0f766e"/><text x="1152" y="540" fill="#fff">Qualified</text>
      <rect x="1018" y="625" width="190" height="72" rx="22" fill="#7c3aed"/><text x="1056" y="670" fill="#fff">Book call</text>
    </g>
    <path d="M1070 531 H1125" stroke="#f8fafc" stroke-width="7" stroke-linecap="round"/>
    <path d="M1205 567 V608 C1205 618 1195 625 1180 625" fill="none" stroke="#f8fafc" stroke-width="7" stroke-linecap="round"/>
    <circle cx="1370" cy="655" r="42" fill="#22c55e"/>
    <path d="M1352 655 l13 13 25-29" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="110" y="805" width="430" height="48" rx="24" fill="#ffffff" opacity="0.1"/>
    <text x="136" y="838" fill="#f8fafc" font-size="22" font-weight="700">Websiteli · Swiss websites, automation &amp; AI</text>
  </g>
