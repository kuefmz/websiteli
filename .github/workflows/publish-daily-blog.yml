name: Publish daily blog

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"
    - cron: "0 9 * * *"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Europe/Zurich publish hour
        id: zurich-time
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$(TZ=Europe/Zurich date +%H)" = "10" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.zurich-time.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.zurich-time.outputs.should_run == 'true'
        run: npm ci

      - name: Publish due blog post
        if: steps.zurich-time.outputs.should_run == 'true'
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
        run: npm run publish:daily-blog

      - name: Commit changes
        if: steps.zurich-time.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Publish daily blog post"
          git push
