name: Build

on:
  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: build-production
  cancel-in-progress: false

jobs:
  build:
    name: Build server-rendered site
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run test:pricing

      - name: Verify server build output
        run: |
          test -d dist || (echo "dist/ was not created by npm run build" && exit 1)
          test -d .vercel/output || (echo ".vercel/output was not created by npm run build" && exit 1)
          test -f .vercel/output/config.json || (echo ".vercel/output/config.json is missing" && exit 1)
          echo "Build output:"
          find .vercel/output -maxdepth 3 -type f | sort
