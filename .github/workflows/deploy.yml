name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build and test static site
        run: npm run test:pricing

      - name: Verify GitHub Pages build output
        run: |
          test -d dist || (echo "dist/ was not created" && exit 1)
          test -f dist/index.html || (echo "dist/index.html is missing" && exit 1)
          test -f dist/en/index.html || (echo "dist/en/index.html is missing" && exit 1)
          test -f dist/CNAME || (echo "dist/CNAME is missing" && exit 1)
          grep -q "websiteli.ch" dist/CNAME || (echo "dist/CNAME does not contain websiteli.ch" && exit 1)
          grep -q "G-TGZY875FGJ" dist/en/index.html || (echo "dist/en/index.html does not contain the Google Analytics tag" && exit 1)

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/

  deploy:
    name: Deploy static site
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
