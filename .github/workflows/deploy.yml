name: Build Hostpoint Static App

on:
  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: hostpoint-static-build
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test pricing behavior
        run: npm run test:pricing

      - name: Verify Hostpoint static build output
        run: |
          test -d dist || (echo "dist/ was not created by npm run build" && exit 1)
          test -f dist/index.html || (echo "dist/index.html is missing" && exit 1)
          echo "Build output:"
          find dist -maxdepth 3 -type f | sort

      - name: Upload Hostpoint static build artifact
        uses: actions/upload-artifact@v4
        with:
          name: hostpoint-static-build
          path: dist/
          if-no-files-found: error
