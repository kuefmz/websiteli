name: Deploy Hostpoint Static App

on:
  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: hostpoint-static-build
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy static site
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test pricing behavior
        run: npm run test:pricing

      - name: Verify Hostpoint static build output
        run: |
          test -d dist || (echo "dist/ was not created by npm run build" && exit 1)
          test -f dist/index.html || (echo "dist/index.html is missing" && exit 1)
          grep -q "pricing_debug" dist/index.html || (echo "dist/index.html does not contain the current pricing script" && exit 1)
          echo "Build output:"
          find dist -maxdepth 3 -type f | sort

      - name: Upload Hostpoint static build artifact
        uses: actions/upload-artifact@v4
        with:
          name: hostpoint-static-build
          path: dist/
          if-no-files-found: error

      - name: Install deployment tool
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy static site to Hostpoint
        env:
          HOSTPOINT_HOST: ${{ secrets.HOSTPOINT_HOST }}
          HOSTPOINT_USERNAME: ${{ secrets.HOSTPOINT_USERNAME }}
          HOSTPOINT_PASSWORD: ${{ secrets.HOSTPOINT_PASSWORD }}
          HOSTPOINT_TARGET_PATH: ${{ secrets.HOSTPOINT_TARGET_PATH }}
        run: bash scripts/deploy.sh
