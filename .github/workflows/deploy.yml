name: Build Hostpoint Node App

on:
  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: hostpoint-node-build
  cancel-in-progress: false

jobs:
  build:
    name: Build standalone Node server
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test pricing behavior
        run: npm run test:pricing

      - name: Build Hostpoint Node server
        run: npm run build:node

      - name: Verify Node server build output
        run: |
          test -d dist || (echo "dist/ was not created by npm run build" && exit 1)
          test -f dist/server/entry.mjs || (echo "dist/server/entry.mjs is missing" && exit 1)
          test -d dist/client || (echo "dist/client is missing" && exit 1)
          echo "Build output:"
          find dist -maxdepth 3 -type f | sort
