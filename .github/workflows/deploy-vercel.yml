name: Deploy to Vercel

on:
  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy server-rendered site
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test pricing behavior
        run: npm run test:pricing

      - name: Pull Vercel project settings
        run: npm exec --yes vercel@latest -- pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel output
        run: npm exec --yes vercel@latest -- build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: npm exec --yes vercel@latest -- deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
